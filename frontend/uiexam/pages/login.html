<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PollBuilder — Log in (wireframe)</title>
<link rel="stylesheet" href="../css/wireframe.css">
</head>
<body>
<div class="app-shell">
  <header class="app-header"><div class="app-header__inner">
    <a class="brand">
      <span class="brand__mark ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="m9 12 2 2 4-4"/><path d="M5 7c0-1.1.9-2 2-2h10a2 2 0 0 1 2 2v12H5z"/><path d="M22 19H2"/></svg></span>
      <span class="brand__text h-gradient">PollBuilder</span>
    </a>
    <nav class="app-nav">
      <a class="nav-link">Create</a>
      <a class="nav-link nav-link--active">Log in</a>
      <a class="nav-link nav-link--cta">Register</a>
    </nav>
  </div></header>

  <main>
    <div class="page page--narrow">
      <div class="card auth-card">
        <div class="auth-head">
          <span class="auth-badge ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg></span>
          <h1>Welcome back</h1>
          <p class="muted">Log in to manage your polls.</p>
        </div>

        <form class="auth-form" onsubmit="return false">
          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="jane@company.com">
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="pw-wrap">
              <input type="password" placeholder="••••••••">
              <button type="button" class="pw-toggle ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
          </div>
          <button type="submit" class="btn btn--block">Log in</button>
        </form>

        <p class="auth-foot">No account? <a>Create one</a></p>
      </div>
    </div>
  </main>

  <footer class="app-footer">
    <span class="mono">Poll &amp; Survey Builder</span><span>·</span><span>Live results in real time</span><span>·</span><span>AMD201</span>
  </footer>
</div>
</body>
</html>
