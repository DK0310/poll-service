<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PollBuilder — Analytics (wireframe)</title>
<link rel="stylesheet" href="../css/wireframe.css">
</head>
<body>
<div class="app-shell">
  <header class="app-header"><div class="app-header__inner">
    <a class="brand">
      <span class="brand__mark ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="m9 12 2 2 4-4"/><path d="M5 7c0-1.1.9-2 2-2h10a2 2 0 0 1 2 2v12H5z"/><path d="M22 19H2"/></svg></span>
      <span class="brand__text h-gradient">PollBuilder</span>
    </a>
    <nav class="app-nav">
      <a class="nav-link">Create</a>
      <a class="nav-link">My Polls</a>
      <button class="nav-link">Log out</button>
    </nav>
  </div></header>

  <main>
    <div class="page">

      <!-- KPI stats -->
      <div class="card">
        <div class="analytics-head">
          <h1>Analytics</h1>
          <p class="muted">How did this sprint feel?</p>
        </div>
        <div class="stat-grid">
          <div class="stat-card">
            <span class="stat-card__num h-gradient tnum">124</span>
            <span class="stat-card__label">Total votes</span>
          </div>
          <div class="stat-card">
            <span class="stat-card__num h-gradient">Good</span>
            <span class="stat-card__label">Top option · 55 votes</span>
          </div>
          <div class="stat-card">
            <span class="stat-card__num h-gradient tnum">2:14&nbsp;PM</span>
            <span class="stat-card__label">Peak minute · 28 votes</span>
          </div>
        </div>
      </div>

      <!-- votes over time line chart -->
      <div class="card chart-card">
        <h2 class="chart-card__title">Votes over time</h2>
        <svg class="line-chart" viewBox="0 0 600 240" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Votes over time line chart">
          <!-- gridlines -->
          <line x1="40" y1="20"  x2="580" y2="20"  stroke="#fecdd3" stroke-width="1"/>
          <line x1="40" y1="70"  x2="580" y2="70"  stroke="#fecdd3" stroke-width="1"/>
          <line x1="40" y1="120" x2="580" y2="120" stroke="#fecdd3" stroke-width="1"/>
          <line x1="40" y1="170" x2="580" y2="170" stroke="#fecdd3" stroke-width="1"/>
          <line x1="40" y1="200" x2="580" y2="200" stroke="#be123c" stroke-width="1.5"/>
          <!-- y axis labels -->
          <text class="chart-axis" x="30" y="24"  text-anchor="end">30</text>
          <text class="chart-axis" x="30" y="124" text-anchor="end">15</text>
          <text class="chart-axis" x="30" y="204" text-anchor="end">0</text>
          <!-- area + line -->
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#e11d48"/><stop offset="1" stop-color="#2563eb"/>
            </linearGradient>
          </defs>
          <polyline points="40,190 130,150 220,80 310,40 400,95 490,120 580,60"
                    fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- dots -->
          <g fill="#e11d48">
            <circle cx="40" cy="190" r="4"/><circle cx="130" cy="150" r="4"/><circle cx="220" cy="80" r="4"/>
            <circle cx="310" cy="40" r="4"/><circle cx="400" cy="95" r="4"/><circle cx="490" cy="120" r="4"/><circle cx="580" cy="60" r="4"/>
          </g>
          <!-- x axis labels -->
          <text class="chart-axis" x="40"  y="222" text-anchor="middle">2:10</text>
          <text class="chart-axis" x="220" y="222" text-anchor="middle">2:13</text>
          <text class="chart-axis" x="400" y="222" text-anchor="middle">2:16</text>
          <text class="chart-axis" x="580" y="222" text-anchor="middle">2:19</text>
        </svg>
        <button class="btn-link" style="margin-top:12px;">▤ Show data table</button>
      </div>

      <a class="btn-outline analytics-back">← Back to live results</a>

    </div>
  </main>

  <footer class="app-footer">
    <span class="mono">Poll &amp; Survey Builder</span><span>·</span><span>Live results in real time</span><span>·</span><span>AMD201</span>
  </footer>
</div>
</body>
</html>
