server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Fingerprinted build assets (Vite emits hashed filenames) — cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The HTML entry references the hashed bundles, so it must NEVER be cached —
    # otherwise the browser keeps loading stale bundle hashes (old UI) until a
    # hard refresh. Applies to direct hits and the SPA fallback below.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA fallback — let the client router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST → API Gateway (server-side proxy; same origin to the browser).
    location /api/ {
        proxy_pass ${GATEWAY_URL}/api/;
        # Upstream is an HTTPS service behind SNI-based routing (Render):
        # send SNI + set Host to the upstream so its edge routes correctly.
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR → API Gateway (WebSocket upgrade REQUIRED).
    location /hubs/ {
        proxy_pass ${GATEWAY_URL}/hubs/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}
