name: Keep demo services awake

# Render's free tier spins each service down after ~15 min of no incoming requests.
# Ping every service on a shorter cycle so the whole stack stays warm for demos —
# runs on GitHub's infrastructure, so it doesn't depend on any local machine/app
# staying open, and costs nothing (a few seconds of Actions time per run).
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    name: Ping services
    runs-on: ubuntu-latest
    steps:
      - name: Wake all services
        run: |
          urls=(
            "https://pollbuilder-frontend-latest.onrender.com/"
            "https://pollbuilder-gateway-latest.onrender.com/api/auth/warmup"
            "https://pollbuilder-identity-api-latest.onrender.com/api/auth/warmup"
            "https://pollbuilder-poll-api-latest-1.onrender.com/api/polls/warmup"
            "https://pollbuilder-vote-api-latest.onrender.com/api/polls/warmup/results"
          )
          status=0
          for url in "${urls[@]}"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$url" || echo "000")
            echo "$url -> $code"
            if [ "$code" = "000" ]; then
              echo "::warning::$url did not respond at all"
              status=1
            fi
          done
          exit $status
